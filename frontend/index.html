<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Budget Tracker - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-r from-indigo-600 to-purple-600 flex items-center justify-center min-h-screen">

  <!-- Container -->
  <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
    <h1 class="text-2xl font-bold text-center text-indigo-700">Budget Tracker</h1>
    <p class="text-gray-500 text-center mb-6">Manage your expenses smartly 💸</p>

    <!-- Tabs -->
    <div class="flex mb-6 border-b border-gray-200">
      <button id="loginTab" class="flex-1 py-2 text-indigo-600 font-semibold border-b-2 border-indigo-600">Login</button>
      <button id="signupTab" class="flex-1 py-2 text-gray-500">Signup</button>
    </div>

    <!-- Login Form -->
    <form id="loginForm" class="space-y-4">
      <input type="email" placeholder="Email" class="w-full px-4 py-2 border rounded-lg focus:ring focus:ring-indigo-300" required>
      <input type="password" placeholder="Password" class="w-full px-4 py-2 border rounded-lg focus:ring focus:ring-indigo-300" required>
      <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700">Login</button>
    </form>

    <!-- Signup Form (Hidden by default) -->
    <form id="signupForm" class="space-y-4 hidden">
      <input type="text" placeholder="Name" class="w-full px-4 py-2 border rounded-lg focus:ring focus:ring-purple-300" required>
      <input type="email" placeholder="Email" class="w-full px-4 py-2 border rounded-lg focus:ring focus:ring-purple-300" required>
      <input type="password" placeholder="Password" class="w-full px-4 py-2 border rounded-lg focus:ring focus:ring-purple-300" required>
      <button type="submit" class="w-full bg-purple-600 text-white py-2 rounded-lg hover:bg-purple-700">Signup</button>
    </form>
  </div>

  <script>
    const loginTab = document.getElementById("loginTab");
    const signupTab = document.getElementById("signupTab");
    const loginForm = document.getElementById("loginForm");
    const signupForm = document.getElementById("signupForm");

    loginTab.addEventListener("click", () => {
      loginForm.classList.remove("hidden");
      signupForm.classList.add("hidden");
      loginTab.classList.add("text-indigo-600", "border-indigo-600", "font-semibold");
      signupTab.classList.remove("text-purple-600", "border-purple-600", "font-semibold");
      signupTab.classList.add("text-gray-500");
    });

    signupTab.addEventListener("click", () => {
      signupForm.classList.remove("hidden");
      loginForm.classList.add("hidden");
      signupTab.classList.add("text-purple-600", "border-purple-600", "font-semibold");
      loginTab.classList.remove("text-indigo-600", "border-indigo-600", "font-semibold");
      loginTab.classList.add("text-gray-500");
    });

    // Temporary redirect (until backend is connected)
    loginForm.addEventListener("submit", (e) => {
      e.preventDefault();
      window.location.href = "dashboard.html";
    });

    signupForm.addEventListener("submit", (e) => {
      e.preventDefault();
      window.location.href = "dashboard.html";
    });
  </script>
</body>
</html>
