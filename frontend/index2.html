<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard | Expense Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="icon" href="https://img.icons8.com/fluency/48/money.png" />
</head>
<body class="bg-gray-100 font-sans">

  <div class="flex h-screen">
    <!-- Sidebar -->
    <aside class="w-64 bg-white shadow-lg">
      <div class="p-6 border-b text-center">
        <img src="https://img.icons8.com/emoji/48/money-bag-emoji.png" class="w-10 mx-auto mb-2" />
        <h1 class="text-xl font-bold text-gray-800">Expense Manager</h1>
      </div>
      <nav class="p-4 space-y-2 text-sm text-gray-700">
        <a href="#" class="block p-2 rounded hover:bg-gray-100">Overview</a>
        <a href="transactions.html" class="block p-2 rounded hover:bg-gray-100">Transactions</a>
        <a href="budgets.html" class="block p-2 rounded hover:bg-gray-100">Budgets</a>
        <a href="charts.html" class="block p-2 rounded hover:bg-gray-100">Charts</a>
        <a href="calendar.html" class="block p-2 rounded hover:bg-gray-100">Calendar</a>
        <a href="settings.html" class="block p-2 rounded hover:bg-gray-100">Settings</a>
        <a href="../backend/logout.php" class="block p-2 mt-4 text-red-500 hover:bg-red-100">Logout</a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto p-6">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <!-- Summary -->
        <div class="bg-white p-4 rounded shadow col-span-3">
          <h2 class="text-lg font-semibold mb-2">Summary</h2>
          <div class="flex flex-wrap justify-between gap-4">
            <div class="text-green-600 font-bold">Balance: €13,627.71</div>
            <div class="text-red-500 font-bold">Credit cards: -€249.00</div>
            <div class="text-blue-600 font-bold">Net: €13,378.71</div>
          </div>
        </div>

        <!-- Pie Charts -->
        <div class="bg-white p-4 rounded shadow">
          <h3 class="font-semibold mb-2">This Month</h3>
          <canvas id="pieChartThis"></canvas>
        </div>

        <div class="bg-white p-4 rounded shadow">
          <h3 class="font-semibold mb-2">Last Month</h3>
          <canvas id="pieChartLast"></canvas>
        </div>

        <!-- Line Chart -->
        <div class="bg-white p-4 rounded shadow col-span-3">
          <h3 class="font-semibold mb-2">Balance Over Time</h3>
          <canvas id="lineChartBalance"></canvas>
        </div>

        <!-- Bar Chart -->
        <div class="bg-white p-4 rounded shadow col-span-2">
          <h3 class="font-semibold mb-2">Spending (Last 7 Days)</h3>
          <canvas id="barChartSpending"></canvas>
        </div>

        <!-- Budgets -->
        <div class="bg-white p-4 rounded shadow">
          <h3 class="font-semibold mb-2">Budgets</h3>
          <div class="space-y-2 text-sm">
            <div>
              Entertainment: €8 / €30
              <div class="w-full h-2 bg-gray-200 rounded">
                <div class="h-full bg-green-400 rounded" style="width: 27%"></div>
              </div>
            </div>
            <div>
              Eating Out: €45.50 / €100
              <div class="w-full h-2 bg-gray-200 rounded">
                <div class="h-full bg-yellow-400 rounded" style="width: 46%"></div>
              </div>
            </div>
            <div>
              Fuel: €30 / €120
              <div class="w-full h-2 bg-gray-200 rounded">
                <div class="h-full bg-red-400 rounded" style="width: 25%"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- Floating Button -->
        <div class="fixed bottom-6 right-6 space-y-4">
          <a href="add.html" class="bg-green-500 hover:bg-green-600 text-white p-4 rounded-full shadow-lg text-xl">＋</a>
        </div>

      </div>
    </main>
  </div>

  <!-- Chart.js Demo Data -->
  <script>
    const ctxPie1 = document.getElementById('pieChartThis');
    const ctxPie2 = document.getElementById('pieChartLast');
    const ctxLine = document.getElementById('lineChartBalance');
    const ctxBar = document.getElementById('barChartSpending');

    new Chart(ctxPie1, {
      type: 'doughnut',
      data: {
        labels: ['Income', 'Expense'],
        datasets: [{
          data: [1452, 617.29],
          backgroundColor: ['#10B981', '#EF4444'],
        }]
      }
    });

    new Chart(ctxPie2, {
      type: 'doughnut',
      data: {
        labels: ['Income', 'Expense'],
        datasets: [{
          data: [1500, 345],
          backgroundColor: ['#3B82F6', '#F87171'],
        }]
      }
    });

    new Chart(ctxLine, {
      type: 'line',
      data: {
        labels: ['Mar', 'Apr', 'May', 'Jun', 'Jul'],
        datasets: [{
          label: 'Balance',
          data: [11200, 11350, 11800, 12000, 13627],
          borderColor: '#3B82F6',
          backgroundColor: 'rgba(59, 130, 246, 0.2)',
          fill: true
        }]
      }
    });

    new Chart(ctxBar, {
      type: 'bar',
      data: {
        labels: ['Thu', 'Fri', 'Sat', 'Sun', 'Mon', 'Tue', 'Wed'],
        datasets: [{
          label: 'Expenses',
          data: [120, 20, 60, 35, 40, 30, 10],
          backgroundColor: ['#EF4444']
        }]
      }
    });
  </script>

</body>
</html>
